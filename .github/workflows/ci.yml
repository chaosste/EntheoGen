name: CI

on:
  pull_request:
    branches:
      - main
      - auto-dev
  push:
    branches:
      - auto-dev
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: entheogen-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Validation Alignment
        run: npm test

      - name: Alignment Suite
        run: npm run test:suite:alignment

      - name: Build
        run: npm run build
